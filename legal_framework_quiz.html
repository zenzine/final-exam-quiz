let questions = originalQuestions.map((q,i)=>({...q,id:i+1}));
let answers = JSON.parse(localStorage.getItem('legal_quiz_answers')||'{}');
let choiceOrders = JSON.parse(localStorage.getItem('legal_quiz_choice_orders')||'{}');

function save(){
  localStorage.setItem('legal_quiz_answers',JSON.stringify(answers));
}

function saveChoiceOrders(){
  localStorage.setItem('legal_quiz_choice_orders',JSON.stringify(choiceOrders));
}

function defaultOrder(q){
  return q.choices.map((_,i)=>i);
}

function ensureChoiceOrders(){
  questions.forEach(q=>{
    if(!Array.isArray(choiceOrders[q.id]) || choiceOrders[q.id].length !== q.choices.length){
      choiceOrders[q.id] = defaultOrder(q);
    }
  });
  saveChoiceOrders();
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function shuffleChoices(){
  ensureChoiceOrders();
  questions.forEach(q=>{
    let newOrder = shuffleArray(defaultOrder(q));

    if(newOrder.join(',') === choiceOrders[q.id].join(',') && newOrder.length > 1){
      newOrder.push(newOrder.shift());
    }

    choiceOrders[q.id] = newOrder;
  });
  saveChoiceOrders();
  render();
}

function resetChoiceOrder(){
  if(confirm('รีเซ็ตลำดับ Choice กลับเป็นแบบเดิมใช่ไหม?')){
    choiceOrders = {};
    ensureChoiceOrders();
    render();
  }
}
function applyHeaderState(){const compact=localStorage.getItem('legal_quiz_header')==='1';document.getElementById('pageHeader').classList.toggle('compact',compact);document.getElementById('toggleHeader').textContent=compact?'แสดงแถบค้นหา':'ซ่อนแถบด้านบน'}
function toggleHeader(){const compact=!document.getElementById('pageHeader').classList.contains('compact');localStorage.setItem('legal_quiz_header',compact?'1':'0');applyHeaderState()}
function buildTopics(){const sel=document.getElementById('topic');[...new Set(questions.map(q=>q.topic))].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});}
function filtered(){const s=document.getElementById('search').value.trim().toLowerCase();const t=document.getElementById('topic').value;const m=document.getElementById('mode').value;return questions.filter(q=>{const a=answers[q.id];const txt=(q.question+' '+q.choices.join(' ')+' '+q.topic).toLowerCase();if(s&&!txt.includes(s))return false;if(t!=='all'&&q.topic!==t)return false;if(m==='unanswered'&&a!==undefined)return false;if(m==='wrong'&&(a===undefined||a===q.answer))return false;if(m==='correct'&&a!==q.answer)return false;return true;});}
function updateStats(){let answered=0,score=0;questions.forEach(q=>{if(answers[q.id]!==undefined){answered++; if(answers[q.id]===q.answer) score++;}});document.getElementById('totalPill').textContent=questions.length+' ข้อ';document.getElementById('answeredPill').textContent='ตอบแล้ว '+answered;document.getElementById('scorePill').textContent='คะแนน '+score+'/'+answered;}
function render(){
  ensureChoiceOrders();

  const root=document.getElementById('quiz');
  const list=filtered();
  updateStats();
  root.innerHTML='';

  if(!list.length){
    root.innerHTML='<div class="card empty">ไม่พบข้อที่ตรงกับตัวกรอง</div>';
    return;
  }

  list.forEach(q=>{
    const card=document.createElement('section');
    card.className='card';
    card.id='q-'+q.id;

    const a=answers[q.id];
    const order=choiceOrders[q.id] || defaultOrder(q);
    const correctDisplayIndex=order.indexOf(q.answer);

    if(a!==undefined) card.classList.add('show');

    const choices=order.map((originalChoiceIndex,displayIndex)=>{
      const c=q.choices[originalChoiceIndex];
      let cls='choice';

      if(a!==undefined){
        if(originalChoiceIndex===q.answer) cls+=' correct';
        else if(originalChoiceIndex===a) cls+=' wrong';
      }

      return `<button class="${cls}" onclick="choose(${q.id},${originalChoiceIndex})"><b>${String.fromCharCode(65+displayIndex)}.</b> ${c}</button>`;
    }).join('');

    card.innerHTML=`
      <div class="meta">
        <span class="tag">ข้อ ${q.id} / ${questions.length}</span>
        <span class="tag">${q.topic}</span>
      </div>
      <div class="question">${q.question}</div>
      <div class="choices">${choices}</div>
      <div class="explanation">
        <b>คำตอบ: ${String.fromCharCode(65+correctDisplayIndex)}.</b> ${q.choices[q.answer]}
      </div>
      <div class="footerRow">
        <span class="small">Quiz practice</span>
        <button class="btn" onclick="toggleExplain(${q.id})">แสดง/ซ่อนคำตอบ</button>
      </div>
    `;

    root.appendChild(card);
  });
}
function choose(id,ci){answers[id]=ci;save();render();}
function toggleExplain(id){document.getElementById('q-'+id)?.classList.toggle('show')}
function showAllAnswers(){document.querySelectorAll('.card').forEach(c=>c.classList.add('show'));}
function hideAllAnswers(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('show'))}
function resetAnswers(){if(confirm('ล้างคำตอบทั้งหมดใช่ไหม?')){answers={};save();render();}}
function shuffleQuestions(){for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}render();}
document.getElementById('search').addEventListener('input',render);
document.getElementById('topic').addEventListener('change',render);
document.getElementById('mode').addEventListener('change',render);

applyHeaderState();
buildTopics();
ensureChoiceOrders();
render();
</script></body></html>

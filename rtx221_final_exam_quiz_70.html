{"topic": "Image Processing", "question": "1. ข้อใดกล่าวถูกต้องเกี่ยวกับ Image post processing พัฒนาภาพหลังถ่ายเพื่อผลลัพธ์ที่ดีกว่า", "choices": ["ช่วยให้แพทย์สามารถวินิจฉัยได้ง่ายขึ้น", "ช่วยลดเวลาในการประมวลผลภาพของรังสีเทคนิคก่อนส่งให้รังสีแพทย์อ่านผล", "สามารถกำจัด noise และ artifact ได้อย่างมีประสิทธิภาพ", "ถูกทุกข้อ", "ไม่มีข้อใดถูก"], "answer": 3, "explanation": "Image post processing ช่วยปรับปรุงภาพให้วินิจฉัยง่ายขึ้น ลดเวลาการจัดการภาพ และกำจัด Noise/Artifact ได้"},
{"topic": "Image Processing", "question": "2. ข้อใดเป็นส่วนหนึ่งของ image post processing ในทางการตรวจทางรังสี", "choices": ["Image filtering", "Segmentation", "Registration", "3D/VRT", "ถูกทุกข้อ"], "answer": 4, "explanation": "กระบวนการ post processing ครอบคลุมทั้ง filtering, segmentation, registration และการทำ 3D reconstruction"},
{"topic": "Image Processing", "question": "3. ข้อใดเป็นการใช้ histogram ให้เกิดประโยชน์", "choices": ["การปรับภาพให้มี Contrast ดีขึ้น เพิ่มคุณภาพของภาพ", "ปรับภาพให้มีความคมชัด (sharpness) มากขึ้น", "สามารถบ่งบอกภาพได้ว่าอยู่ในโทนมืดหรือสว่าง", "ข้อ ก และ ข ถูก", "ข้อ ก และ ค ถูก"], "answer": 4, "explanation": "Histogram ใช้เพื่อปรับค่า Contrast ของภาพและบอกได้ว่าภาพอยู่ในโทนมืดหรือสว่าง (sharpness ไม่เกี่ยวกับ histogram โดยตรง)"},
{"topic": "Image Processing", "question": "4. ข้อใดกล่าวถูกต้องเกี่ยวกับการใช้ unsharp mask filter", "choices": ["สามารถนำมาดูในบางอวัยวะ เช่น ปอดและกระดูกได้ดี", "เน้นรายละเอียดของภาพ และขอบของภาพ", "ปรับแต่งทำให้ภาพเนียน (smooth) เพื่อกำจัด noise", "ข้อ ก และ ข ถูก", "ข้อ ข และ ค ถูก"], "answer": 3, "explanation": "Unsharp mask filter เป็น high-pass filter ช่วยเน้นขอบ (edge enhancement) ทำให้ภาพคมชัด นิยมใช้ดูปอดและกระดูก"},
{"topic": "Image Processing", "question": "5. การเปลี่ยนจากภาพใน spatial domain มาเป็น frequency domain ต้องใช้ฟังก์ชันใด", "choices": ["Exponential", "Fraction integration", "Differential equation", "Fourier transform", "Logarithm"], "answer": 3, "explanation": "Fourier transform เป็นกระบวนการทางคณิตศาสตร์ที่แปลงสัญญาณจาก spatial domain ไปยัง frequency domain"},
{"topic": "Image Processing", "question": "6. ข้อใดเป็นการประยุกต์ segmentation ในเชิงการสร้างภาพทางรังสี", "choices": ["การเลือก threshold ของ CT number เพื่อกำจัดส่วนกระดูก", "เลือกดูในส่วนของอวัยวะที่สนใจ", "แยกส่วนประกอบของเส้นเลือด", "นำมาใช้ประโยชน์วัดความหนากะโหลก", "ถูกทุกข้อ"], "answer": 4, "explanation": "Segmentation คือการแยกส่วนประกอบหรือจำแนกภาพออกเป็นส่วนย่อยๆ เพื่อนำไปวิเคราะห์และสร้างภาพเฉพาะส่วน"},
{"topic": "Image Processing", "question": "7. ข้อใดกล่าวถูกเกี่ยวกับ Classification", "choices": ["มีความสัมพันธ์กับสัญญาณและ density ของภาพ", "แยกวัตถุออกจากพื้นหลัง", "สามารถนำมาประยุกต์ใช้แยกอวัยวะในร่างกายได้", "ข้อ ก และ ข ถูก", "ถูกทุกข้อ"], "answer": 4, "explanation": "Classification เป็นกระบวนการจำแนกวัตถุหรือเนื้อเยื่อจาก pixel value/density เพื่อแยกอวัยวะและวัตถุออกจากพื้นหลัง"},

{"topic": "3D Reconstruction", "question": "10. ข้อใดกล่าวถูกต้องเกี่ยวกับ MPR (Multi planar reconstruction)", "choices": ["ไม่มีผลกระทบจาก slice thickness", "ขนาดของ Voxel มีผลต่อการสร้างภาพ (3D)", "ไม่สามารถกระทำแบบ real time viewer", "เป็นเทคนิคในการสร้างภาพ sagittal เฉพาะ MRI เท่านั้น", "ถูกทุกข้อ"], "answer": 1, "explanation": "MPR เป็นการสร้างระนาบภาพใหม่จากชุดข้อมูลเดิม ขนาดของ Voxel จะมีผลต่อคุณภาพและความคมชัดของภาพในระนาบใหม่"},

{"topic": "3D Reconstruction", "question": "12. ข้อใดกล่าวถูกต้องเกี่ยวกับ Fly through image", "choices": ["พบจากการตรวจ chest radiography", "เทคนิคพิเศษเฉพาะ Vascular", "พบจากการตรวจ Ultrasound", "ตรวจกระดูกไขสันหลัง", "ดูอวัยวะภายในเสมือนการบินสำรวจ"], "answer": 4, "explanation": "Virtual Endoscopy / Fly through เป็นเทคนิค 3D ที่จำลองมุมมองเสมือนการส่องกล้องเข้าไปในอวัยวะที่เป็นโพรงหรือท่อ"},
{"topic": "3D Reconstruction", "question": "13. ข้อใดกล่าวถูกต้องเกี่ยวกับ Minimal intensity project (MinIP)", "choices": ["คล้ายกับ MIP แต่แสดงผลที่ตรงข้ามกัน", "ใช้หลักการแสดงผล lowest intensity มาแสดงผล", "ใช้ดูอวัยวะเช่น lung, trachea หรืออวัยวะที่มีอากาศ", "ข้อ ก และ ข ถูก", "ถูกทุกข้อ"], "answer": 4, "explanation": "MinIP จะเลือกพิกเซลที่มีความเข้มน้อยที่สุดมาแสดงผล เหมาะสำหรับการดูโครงสร้างที่มีอากาศ เช่น ทางเดินหายใจ"},
{"topic": "Informatics & HIS/RIS", "question": "14. ข้อใดกล่าวถูกต้องเกี่ยวกับ imaging informatics", "choices": ["ระบบการจัดการข้อมูลภาพเฉพาะกลุ่มงานทางด้านรังสีเท่านั้น", "บทบาทของผู้รับผิดชอบเป็นหน่วยงานรังสีวิทยา", "ระบบรองรับความสะดวกสบายในการเข้าถึงข้อมูลภาพทางการแพทย์", "มีสมาคม SCAR ดูแลและพัฒนา", "ถูกทุกข้อ"], "answer": 4, "explanation": "Imaging informatics เน้นการจัดการและเข้าถึงภาพทางการแพทย์ มีสมาคมเช่น SCAR (หรือ SIIM) เป็นผู้ดูแลพัฒนาในระดับสากล"},
{"topic": "Informatics & HIS/RIS", "question": "15. ข้อใดกล่าวถูกเกี่ยวกับ HIS (Hospital information system)", "choices": ["จำเป็นต้องทำงานร่วมกับระบบ RIS เสมอ", "มีระบบ HL 7 รองรับในการเชื่อมต่อสื่อสาร", "สำหรับฝ่ายบริการทางการแพทย์และการพยาบาลโดยเฉพาะ", "เป็นระบบที่ใช้สร้างภาพ image processing ใน PACS", "ข้อ ข และ ค ถูก"], "answer": 4, "explanation": "HIS จัดการข้อมูลผู้ป่วยรวมของทั้งโรงพยาบาลสำหรับบริการทางการแพทย์ และมักใช้มาตรฐานสื่อสาร HL7"},
{"topic": "Informatics & HIS/RIS", "question": "16. ข้อใดกล่าวถูกเกี่ยวกับ RIS (Radiological information system)", "choices": ["จำเป็นต้องทำงานร่วมกับระบบ HIS เสมอ", "มีระบบ HL 7 รองรับในการเชื่อมต่อสื่อสาร", "เป็นระบบที่ใช้ในโรงพยาบาลสำหรับหน่วยงานทางด้านรังสี", "ข้อ ข และ ค ถูก", "ถูกทุกข้อ"], "answer": 3, "explanation": "RIS เป็นระบบจัดการข้อมูลเฉพาะแผนกรังสี รองรับมาตรฐาน HL7 เพื่อคุยกับ HIS"},
{"topic": "Informatics & HIS/RIS", "question": "17. จงเรียงลำดับตาม Imaging hierarchy การจัดลำดับความสำคัญใน DICOM", "choices": ["image > study > patient > series", "patient > study > series > image", "series > image > study > patient", "patient > series > study > image", "study > series > image > patient"], "answer": 1, "explanation": "โครงสร้างข้อมูล DICOM เรียงจากระดับใหญ่ไปเล็กคือ ผู้ป่วย (Patient) -> การตรวจ (Study) -> ชุดภาพ (Series) -> ภาพ (Image)"},

let questions = originalQuestions.map((q,i)=>({...q,id:i+1}));
let answers = JSON.parse(localStorage.getItem('rtx221_final_exam_answers')||'{}');
let choiceOrders = JSON.parse(localStorage.getItem('rtx221_final_exam_choice_orders')||'{}');

const thaiChoices = ['ก', 'ข', 'ค', 'ง', 'จ']; // Added Thai character labels

function save(){localStorage.setItem('rtx221_final_exam_answers',JSON.stringify(answers));}
function saveChoiceOrders(){localStorage.setItem('rtx221_final_exam_choice_orders',JSON.stringify(choiceOrders));}
function defaultOrder(q){return q.choices.map((_,i)=>i);}
function ensureChoiceOrders(){questions.forEach(q=>{if(!Array.isArray(choiceOrders[q.id])||choiceOrders[q.id].length!==q.choices.length){choiceOrders[q.id]=defaultOrder(q);}});saveChoiceOrders();}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function shuffleChoices(){ensureChoiceOrders();questions.forEach(q=>{let newOrder=shuffleArray(defaultOrder(q));if(newOrder.join(',')===choiceOrders[q.id].join(',')&&newOrder.length>1){newOrder.push(newOrder.shift());}choiceOrders[q.id]=newOrder;});saveChoiceOrders();render();}
function resetChoiceOrder(){if(confirm('รีเซ็ตลำดับ Choice กลับเป็นแบบเดิมใช่ไหม?')){choiceOrders={};ensureChoiceOrders();render();}}
function applyHeaderState(){const compact=localStorage.getItem('rtx221_final_exam_header_compact')==='1';document.getElementById('pageHeader').classList.toggle('compact',compact);document.getElementById('toggleHeader').textContent=compact?'แสดงแถบค้นหา':'ซ่อนแถบด้านบน'}
function toggleHeader(){const compact=!document.getElementById('pageHeader').classList.contains('compact');localStorage.setItem('rtx221_final_exam_header_compact',compact?'1':'0');applyHeaderState()}
function buildTopics(){const sel=document.getElementById('topic');[...new Set(questions.map(q=>q.topic))].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});}
function filtered(){const s=document.getElementById('search').value.trim().toLowerCase();const t=document.getElementById('topic').value;const m=document.getElementById('mode').value;return questions.filter(q=>{const a=answers[q.id];const txt=(q.question+' '+q.choices.join(' ')+' '+q.topic).toLowerCase();if(s&&!txt.includes(s))return false;if(t!=='all'&&q.topic!==t)return false;if(m==='unanswered'&&a!==undefined)return false;if(m==='wrong'&&(a===undefined||a===q.answer))return false;if(m==='correct'&&a!==q.answer)return false;return true;});}
function updateStats(){let answered=0,score=0;questions.forEach(q=>{if(answers[q.id]!==undefined){answered++;if(answers[q.id]===q.answer)score++;}});document.getElementById('totalPill').textContent=questions.length+' ข้อ';document.getElementById('answeredPill').textContent='ตอบแล้ว '+answered;document.getElementById('scorePill').textContent='คะแนน '+score+'/'+answered;}
function render(){ensureChoiceOrders();const root=document.getElementById('quiz');const list=filtered();updateStats();root.innerHTML='';if(!list.length){root.innerHTML='<div class="card empty">ไม่พบข้อที่ตรงกับตัวกรอง</div>';return;}list.forEach(q=>{const card=document.createElement('section');card.className='card';card.id='q-'+q.id;const a=answers[q.id];const order=choiceOrders[q.id]||defaultOrder(q);const correctDisplayIndex=order.indexOf(q.answer);if(a!==undefined)card.classList.add('show');const choices=order.map((originalChoiceIndex,displayIndex)=>{const c=q.choices[originalChoiceIndex];let cls='choice';if(a!==undefined){if(originalChoiceIndex===q.answer)cls+=' correct';else if(originalChoiceIndex===a)cls+=' wrong';}return `<button class="${cls}" onclick="choose(${q.id},${originalChoiceIndex})"><b>${thaiChoices[displayIndex]}.</b> ${c}</button>`;}).join('');card.innerHTML=`<div class="meta"><span class="tag">ข้อ ${q.id} / ${questions.length}</span><span class="tag">${q.topic}</span></div><div class="question">${q.question}</div><div class="choices">${choices}</div><div class="explanation"><b>เฉลย: ${thaiChoices[correctDisplayIndex]}.</b> ${q.choices[q.answer]}<br>${q.explanation}</div><div class="footerRow"><span class="small">Review: ${q.topic}</span><button class="btn" onclick="toggleExplain(${q.id})">แสดง/ซ่อนเฉลยข้อนี้</button></div>`;root.appendChild(card);});}
function choose(id,ci){answers[id]=ci;save();render();}
function toggleExplain(id){document.getElementById('q-'+id)?.classList.toggle('show')}
function showAllAnswers(){document.querySelectorAll('.card').forEach(c=>c.classList.add('show'))}
function hideAllAnswers(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('show'))}
function resetAnswers(){if(confirm('ล้างคำตอบทั้งหมดใช่ไหม?')){answers={};save();render();}}
function shuffleQuestions(){for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}render();}
document.getElementById('search').addEventListener('input',render);document.getElementById('topic').addEventListener('change',render);document.getElementById('mode').addEventListener('change',render);applyHeaderState();buildTopics();ensureChoiceOrders();render();
</script></body></html>

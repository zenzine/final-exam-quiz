<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Final Exam Quiz - Google Form Style</title>
<style>
:root {
  --bg:#f3e8ff;
  --form:#ffffff;
  --purple:#673ab7;
  --purple-dark:#4b2388;
  --border:#dadce0;
  --text:#202124;
  --muted:#5f6368;
  --correct-bg:#e6f4ea;
  --correct:#137333;
  --wrong-bg:#fce8e6;
  --wrong:#c5221f;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, "Noto Sans Thai", sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
}
.container {
  width:min(760px, 100%);
  margin:0 auto;
  padding:18px 12px 90px;
}
.top-card {
  background:var(--form);
  border:1px solid var(--border);
  border-top:10px solid var(--purple);
  border-radius:10px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
}
h1 {
  font-size:26px;
  margin:0 0 4px;
  font-weight:600;
}
.subtitle {
  color:var(--muted);
  font-size:14px;
}
.summary {
  margin-top:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.pill {
  background:#f1ecfb;
  color:var(--purple-dark);
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}
.toolbar {
  background:var(--form);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.toolbar-head {
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
}
.toolbar-title {
  font-weight:700;
  color:var(--purple-dark);
}
button, select, input {
  font:inherit;
}
button {
  border:1px solid var(--border);
  background:#fff;
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
  font-weight:700;
}
button.primary {
  background:var(--purple);
  color:#fff;
  border-color:var(--purple);
}
button.ghost {
  color:var(--purple);
}
.controls {
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:12px;
}
input, select {
  width:100%;
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
  background:#fff;
}
.hide {
  display:none !important;
}
.question-card {
  background:var(--form);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin:12px 0;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
  position:relative;
}
.question-card.correct-card {
  border-left:8px solid var(--correct);
}
.question-card.wrong-card {
  border-left:8px solid var(--wrong);
}
.qtop {
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:8px;
}
.qnum {
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.ref {
  color:var(--purple-dark);
  background:#f1ecfb;
  border-radius:999px;
  padding:4px 9px;
  font-size:12px;
  white-space:nowrap;
}
.qtext {
  font-size:16px;
  font-weight:600;
  margin:8px 0 14px;
}
.option {
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:8px 6px;
  border-radius:8px;
  cursor:pointer;
  border:1px solid transparent;
}
.option:hover {
  background:#f8f9fa;
}
.option input {
  width:auto;
  margin-top:5px;
  accent-color:var(--purple);
}
.option.selected {
  background:#f4efff;
  border-color:#d7c5ff;
}
.option.answer-correct {
  background:var(--correct-bg);
  border-color:#b7dfc2;
}
.option.answer-wrong {
  background:var(--wrong-bg);
  border-color:#f3b7b2;
}
.mark {
  margin-left:auto;
  font-weight:800;
  padding-left:8px;
}
.ok {
  color:var(--correct);
}
.no {
  color:var(--wrong);
}
.feedback {
  display:none;
  margin-top:12px;
  padding:10px 12px;
  border-radius:8px;
  font-weight:700;
}
.feedback.show.correct {
  display:block;
  background:var(--correct-bg);
  color:var(--correct);
}
.feedback.show.wrong {
  display:block;
  background:var(--wrong-bg);
  color:var(--wrong);
}
.answer-note {
  display:block;
  margin-top:4px;
  font-weight:500;
}
.bottom-bar {
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(255,255,255,.96);
  border-top:1px solid var(--border);
  padding:10px 12px;
  z-index:20;
}
.bottom-inner {
  width:min(760px, 100%);
  margin:0 auto;
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
}
.progress {
  flex:1;
  min-width:150px;
  height:8px;
  background:#e8eaed;
  border-radius:999px;
  overflow:hidden;
}
.progress > div {
  height:100%;
  background:var(--purple);
  width:0%;
}
.small {
  color:var(--muted);
  font-size:13px;
}
@media (min-width:720px) {
  .controls {
    grid-template-columns:1fr 1fr 1fr;
  }
}
@media (max-width:520px) {
  .container {
    padding-left:8px;
    padding-right:8px;
  }
  h1 {
    font-size:22px;
  }
  .top-card, .toolbar, .question-card {
    border-radius:8px;
    padding:14px;
  }
  .bottom-inner button {
    padding:8px 9px;
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="container">
  <section class="top-card">
    <h1>Final Exam Quiz</h1>
    <div class="subtitle">Multiple choice จากเนื้อหา PDF หน้า 1–6 เท่านั้น — ไม่รวมหน้า 7–8</div>
    <div class="summary">
      <span class="pill" id="totalPill">0 ข้อ</span>
      <span class="pill" id="answeredPill">ตอบแล้ว 0</span>
      <span class="pill" id="scorePill">คะแนน 0/0</span>
    </div>
  </section>

  <section class="toolbar" id="toolbar">
    <div class="toolbar-head">
      <div class="toolbar-title">ค้นหา / กรองข้อสอบ</div>
      <button class="ghost" type="button" onclick="toggleToolbar()" id="toggleBtn">ซ่อน</button>
    </div>
    <div class="controls" id="controls">
      <input id="search" placeholder="ค้นหาคำถาม เช่น thyroid, CIN, hepatitis" oninput="render()" />
      <select id="topic" onchange="render()"><option value="all">ทุกหัวข้อ</option></select>
      <select id="mode" onchange="render()">
        <option value="all">แสดงทุกข้อ</option>
        <option value="unanswered">เฉพาะยังไม่ตอบ</option>
        <option value="wrong">เฉพาะข้อที่ผิด</option>
        <option value="correct">เฉพาะข้อที่ถูก</option>
      </select>
    </div>
  </section>

  <main id="quiz"></main>
</div>

<div class="bottom-bar">
  <div class="bottom-inner">
    <button class="primary" onclick="checkAll()">ตรวจคำตอบ</button>
    <button onclick="showAllAnswers()">เฉลยทั้งหมด</button>
    <button onclick="resetQuiz()">เริ่มใหม่</button>
    <div class="progress"><div id="bar"></div></div>
    <span class="small" id="progressText">0%</span>
  </div>
</div>

<script>
const QUESTIONS = [{"q": "โรคของระบบต่อมไร้ท่อแบ่งปัญหาหลักได้เป็นข้อใด", "choices": ["Underproduction, Overproduction, Mass lesion growth", "Infection, Trauma, Allergy", "Inflammation, Necrosis, Fibrosis", "Obstruction, Bleeding, Ulcer"], "answer": 0, "ref": "Endocrine"}, {"q": "Anterior pituitary สร้างฮอร์โมนชุดใด", "choices": ["ADH, Oxytocin", "ACTH, TSH, GH, Prolactin, FSH, LH", "Insulin, Glucagon", "T3, T4, Calcitonin"], "answer": 1, "ref": "Pituitary gland"}, {"q": "Posterior pituitary เกี่ยวข้องกับฮอร์โมนใด", "choices": ["ACTH และ TSH", "GH และ Prolactin", "ADH และ Oxytocin", "FSH และ LH"], "answer": 2, "ref": "Pituitary gland"}, {"q": "สาเหตุที่พบบ่อยของ Hyperpituitarism คืออะไร", "choices": ["Anterior pituitary adenoma", "Sheehan syndrome", "Empty sella syndrome", "Diabetes insipidus"], "answer": 0, "ref": "Hyperpituitarism"}, {"q": "Pituitary adenoma ส่วนใหญ่เป็นเนื้องอกชนิดใด", "choices": ["Malignant", "Benign", "Metastatic", "Inflammatory"], "answer": 1, "ref": "Pituitary adenoma"}, {"q": "Prolactinoma ในผู้หญิงมักทำให้เกิดอาการใด", "choices": ["ประจำเดือนขาด และน้ำนมไหลผิดปกติ", "ตัวเตี้ยแคระ", "ทนร้อนไม่ได้", "นิ่วในไต"], "answer": 0, "ref": "Prolactinoma"}, {"q": "Prolactinoma ในผู้ชายมักทำให้เกิดอาการใด", "choices": ["ตาโปน", "ความต้องการทางเพศลดลงและมีบุตรยาก", "ปัสสาวะมาก", "ถ่ายเหลว"], "answer": 1, "ref": "Prolactinoma"}, {"q": "Somatotropic adenoma สร้างฮอร์โมนใดมากเกิน", "choices": ["Prolactin", "GH", "ACTH", "ADH"], "answer": 1, "ref": "Somatotropic adenoma"}, {"q": "GH สูงในเด็กก่อนกระดูกปิดเรียกว่าอะไร", "choices": ["Acromegaly", "Gigantism", "Cretinism", "Myxedema"], "answer": 1, "ref": "GH excess"}, {"q": "GH สูงในผู้ใหญ่หลัง epiphyseal plate ปิดแล้วเรียกว่าอะไร", "choices": ["Acromegaly", "Gigantism", "Cushing syndrome", "Graves disease"], "answer": 0, "ref": "GH excess"}, {"q": "Acromegaly ทำให้ลักษณะใดเด่น", "choices": ["หน้า มือ เท้า โตหนา", "ผิวหนังหน้าแข้งหนาอย่างเดียว", "ตัวเตี้ยแคระ", "ตกขาวเป็นฟอง"], "answer": 0, "ref": "Acromegaly"}, {"q": "สาเหตุของ Hypopituitarism ตามไฟล์มีข้อใด", "choices": ["Ischemic, Surgery, Radiation, Inflammation, Non-functional pituitary adenoma", "Iodine deficiency อย่างเดียว", "HPV infection", "H. pylori infection"], "answer": 0, "ref": "Hypopituitarism"}, {"q": "Sheehan syndrome คือภาวะใด", "choices": ["ต่อมใต้สมองขาดเลือด/ตายช่วงตั้งครรภ์หรือหลังคลอด", "ไทรอยด์โตจากไอโอดีน", "เนื้องอกต่อมหมวกไต", "โรคตับอ่อนอักเสบ"], "answer": 0, "ref": "Sheehan syndrome"}, {"q": "Diabetes insipidus เกิดจากอะไรเป็นหลัก", "choices": ["Insulin มากเกิน", "ADH ไม่พอหรือขาด", "TSH สูง", "PTH สูง"], "answer": 1, "ref": "Posterior pituitary"}, {"q": "อาการหลักของ Diabetes insipidus คือข้อใด", "choices": ["ปัสสาวะมากและกระหายน้ำมาก", "ไอเป็นเลือด", "ตกขาวคาวปลา", "ปวดท้องเฉียบพลัน"], "answer": 0, "ref": "DI"}, {"q": "Central/Neurogenic DI คืออะไร", "choices": ["ไตไม่ตอบสนองต่อ ADH", "ดื่มน้ำมากเกิน", "ADH ลดลง", "Aldosterone สูง"], "answer": 2, "ref": "DI types"}, {"q": "Nephrogenic DI คืออะไร", "choices": ["ไตไม่ตอบสนองต่อ ADH", "ADH ลดลง", "ต่อมใต้สมองสร้าง ACTH มาก", "ไทรอยด์อักเสบจากไวรัส"], "answer": 0, "ref": "DI types"}, {"q": "Hyperthyroidism ทำให้ metabolism เป็นอย่างไร", "choices": ["ลดลง", "เพิ่มขึ้น", "ไม่เปลี่ยน", "หยุดทำงาน"], "answer": 1, "ref": "Thyroid"}, {"q": "สาเหตุหนึ่งของ Hyperthyroidism คือข้อใด", "choices": ["Graves disease", "DiGeorge syndrome", "Orchitis", "Meckel diverticulum"], "answer": 0, "ref": "Hyperthyroidism"}, {"q": "อาการของ Hyperthyroidism คือข้อใด", "choices": ["หัวใจเต้นเร็ว ทนร้อนไม่ได้ อ่อนแรง ท้องเสีย", "ชักจากแคลเซียมต่ำ", "ปวดท้องกดเจ็บ", "ไส้ติ่งแตก"], "answer": 0, "ref": "Hyperthyroidism"}, {"q": "Graves disease มีลักษณะเด่นข้อใด", "choices": ["ตาโปนและผิวหนังหน้าแข้งหนา", "ปากมดลูก strawberry cervix", "bag of worms", "Mallory bodies"], "answer": 0, "ref": "Graves disease"}, {"q": "Hashimoto thyroiditis เป็นสาเหตุที่พบบ่อยของภาวะใด", "choices": ["Hyperthyroidism", "Hypothyroidism", "Hyperparathyroidism", "Pheochromocytoma"], "answer": 1, "re HCC"}, {"q": "Cholesterol gallstones เกิดจากอะไร", "choices": ["Cholesterol↑ / bile salt↓ ทำให้ตกผลึก", "Bacteria สร้าง β-glucuronidase เท่านั้น", "พยาธิใบไม้ตับเท่านั้น", "ADH ต่ำ"], "answer": 0, "ref": "Gallstones"}, {"q": "Brown pigment stones ในเอเชียสัมพันธ์กับอะไร", "choices": ["ติดเชื้อในท่อน้ำดี เช่น E. coli และอาจพบร่วมกับ Ascaris", "ขาด iodine", "HPV 16/18", "BRCA1"], "answer": 0, "ref": "Gallstones"}, {"q": "Cholangiocarcinoma สัมพันธ์กับพยาธิใด", "choices": ["Opisthorchis viverrini", "H. pylori", "Candida albicans", "Trichomonas vaginalis"], "answer": 0, "ref": "Cholangiocarcinoma"}, {"q": "อาหารที่เร่งความเสี่ยง cholangiocarcinoma ตามไฟล์คืออะไร", "choices": ["อาหารหมักดอง เช่นปลาร้า ปลาเจ่า ปลาจ่อม ปลาส้ม มี nitrosamines", "นมที่มี lactose", "อาหารที่มี iodine", "ผักใบเขียว"], "answer": 0, "ref": "Cholangiocarcinoma"}, {"q": "สาเหตุที่พบบ่อยที่สุดของ acute pancreatitis คืออะไร", "choices": ["นิ่ว gallstone", "HPV", "DES", "Cryptorchidism"], "answer": 0, "ref": "Acute pancreatitis"}, {"q": "กลไกสำคัญของ acute pancreatitis คืออะไร", "choices": ["เอนไซม์ตับอ่อนย่อยตับอ่อนเอง", "ADH ขาด", "PTH สูง", "Trophoblastic cells เจริญผิดปกติ"], "answer": 0, "ref": "Acute pancreatitis"}, {"q": "การตรวจ acute pancreatitis ใช้ค่าใด", "choices": ["Amylase หรือ lipase", "PSA อย่างเดียว", "HBsAg อย่างเดียว", "PTH อย่างเดียว"], "answer": 0, "ref": "Acute pancreatitis"}, {"q": "Lipase เมื่อเทียบกับ amylase ใน pancreatitis เป็นอย่างไร", "choices": ["แม่นกว่าและอยู่ได้นานกว่า", "ขึ้นเร็วลงเร็วและไม่จำเพาะกว่า", "ใช้ไม่ได้เลย", "เป็น marker ของ prostate"], "answer": 0, "ref": "Acute pancreatitis"}];

let state = QUESTIONS.map(() => ({ selected: null, checked: false }));

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}

function toggleToolbar() {
  const controls = document.getElementById("controls");
  const btn = document.getElementById("toggleBtn");
  controls.classList.toggle("hide");
  btn.textContent = controls.classList.contains("hide") ? "แสดง" : "ซ่อน";
}

function buildTopics() {
  const sel = document.getElementById("topic");
  const topics = [...new Set(QUESTIONS.map(q => q.ref))].sort();
  for (const t of topics) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    sel.appendChild(opt);
  }
}

function filteredIndexes() {
  const s = document.getElementById("search").value.trim().toLowerCase();
  const t = document.getElementById("topic").value;
  const m = document.getElementById("mode").value;
  return QUESTIONS.map((q, i) => ({ q, i })).filter(({q, i}) => {
    const joined = (q.q + " " + q.choices.join(" ") + " " + q.ref).toLowerCase();
    const matchSearch = !s || joined.includes(s);
    const matchTopic = t === "all" || q.ref === t;
    const answered = state[i].selected !== null;
    const correct = state[i].checked && state[i].selected === q.answer;
    const wrong = state[i].checked && state[i].selected !== null && state[i].selected !== q.answer;
    const matchMode =
      m === "all" ||
      (m === "unanswered" && !answered) ||
      (m === "wrong" && wrong) ||
      (m === "correct" && correct);
    return matchSearch && matchTopic && matchMode;
  }).map(x => x.i);
}

function render() {
  const root = document.getElementById("quiz");
  root.innerHTML = "";
  const idxs = filteredIndexes();
  if (!idxs.length) {
    root.innerHTML = '<section class="question-card">ไม่พบคำถามตาม filter นี้</section>';
    updateStats();
    return;
  }

  for (const i of idxs) {
    const q = QUESTIONS[i];
    const checked = state[i].checked;
    const selected = state[i].selected;
    const isCorrect = checked && selected === q.answer;
    const isWrong = checked && selected !== null && selected !== q.answer;

    const card = document.createElement("section");
    card.className = "question-card" + (isCorrect ? " correct-card" : "") + (isWrong ? " wrong-card" : "");

    const optionsHtml = q.choices.map((choice, ci) => {
      const optSelected = selected === ci;
      const correctOpt = checked && ci === q.answer;
      const wrongOpt = checked && optSelected && ci !== q.answer;
      let cls = "option";
      if (optSelected) cls += " selected";
      if (correctOpt) cls += " answer-correct";
      if (wrongOpt) cls += " answer-wrong";
      const mark = correctOpt ? '<span class="mark ok">✓</span>' : (wrongOpt ? '<span class="mark no">✕</span>' : "");
      return `
        <label class="${cls}">
          <input type="radio" name="q-${i}" ${optSelected ? "checked" : ""} onchange="selectAnswer(${i}, ${ci})" />
          <span>${escapeHtml(choice)}</span>
          ${mark}
        </label>`;
    }).join("");

    let feedbackClass = "feedback";
    let feedbackText = "";
    if (checked) {
      if (isCorrect) {
        feedbackClass += " show correct";
        feedbackText = `ตอบถูก`;
      } else {
        feedbackClass += " show wrong";
        feedbackText = `ตอบผิด <span class="answer-note">คำตอบที่ถูก: ${escapeHtml(q.choices[q.answer])}</span>`;
      }
    }

    card.innerHTML = `
      <div class="qtop">
        <div class="qnum">ข้อที่ ${i + 1} / ${QUESTIONS.length}</div>
        <div class="ref">${escapeHtml(q.ref)}</div>
      </div>
      <div class="qtext">${escapeHtml(q.q)}</div>
      <div class="options">${optionsHtml}</div>
      <div class="${feedbackClass}">${feedbackText}</div>
    `;
    root.appendChild(card);
  }
  updateStats();
}

function selectAnswer(i, ci) {
  state[i].selected = ci;
  state[i].checked = false;
  updateStats();
  render();
}

function checkAll() {
  state.forEach((s) => {
    if (s.selected !== null) s.checked = true;
  });
  updateStats();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showAllAnswers() {
  state.forEach((s, i) => {
    if (s.selected === null) s.selected = QUESTIONS[i].answer;
    s.checked = true;
  });
  updateStats();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetQuiz() {
  if (!confirm("เริ่มใหม่ทั้งหมดใช่ไหม?")) return;
  state = QUESTIONS.map(() => ({ selected: null, checked: false }));
  updateStats();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateStats() {
  const answered = state.filter(s => s.selected !== null).length;
  const checked = state.filter(s => s.checked).length;
  const score = state.filter((s, i) => s.checked && s.selected === QUESTIONS[i].answer).length;
  document.getElementById("totalPill").textContent = QUESTIONS.length + " ข้อ";
  document.getElementById("answeredPill").textContent = "ตอบแล้ว " + answered;
  document.getElementById("scorePill").textContent = "คะแนน " + score + "/" + checked;
  const pct = QUESTIONS.length ? Math.round(answered / QUESTIONS.length * 100) : 0;
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("progressText").textContent = pct + "%";
}

buildTopics();
render();
</script>
